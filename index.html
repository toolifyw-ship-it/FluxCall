<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FluxCall | AI Identity & Workflow Automation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; }
        .bg-flux { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); }
        .n8n-node { border-left: 4px solid #6366f1; background: #f8fafc; transition: all 0.3s ease; }
        .n8n-node:hover { transform: translateX(5px); border-left: 4px solid #a855f7; }
        .pricing-toggle { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); }
        .legal-link:hover { color: #4f46e5; text-decoration: underline; cursor: pointer; }
    </style>
</head>
<body class="bg-[#fcfdfe] text-slate-900">

    <div id="authModal" class="modal items-center justify-center p-4">
        <div class="bg-white rounded-3xl max-w-sm w-full p-8 shadow-2xl text-center relative">
            <h3 class="text-2xl font-black mb-6">Welcome to FluxCall</h3>
            <div class="space-y-4">
                <button id="googleLogin" class="w-full flex items-center justify-center gap-3 border-2 border-slate-100 py-3 rounded-xl font-bold hover:bg-slate-50 transition">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5"> Sign in with Google
                </button>
                <button id="appleLogin" class="w-full flex items-center justify-center gap-3 bg-black text-white py-3 rounded-xl font-bold hover:opacity-90 transition">
                    <i data-lucide="apple" class="w-5 h-5"></i> Sign in with Apple
                </button>
                <button onclick="closeAuthModal()" class="text-slate-400 text-sm font-bold mt-4">Cancel</button>
            </div>
        </div>
    </div>

    <div id="infoModal" class="modal items-center justify-center p-4">
        <div class="bg-white rounded-3xl max-w-2xl w-full max-h-[80vh] overflow-y-auto p-8 shadow-2xl relative">
            <div class="flex justify-between items-center mb-6">
                <h3 id="modalTitle" class="text-2xl font-black text-slate-900">Information</h3>
                <button onclick="closeInfoModal()" class="text-slate-400 hover:text-slate-900"><i data-lucide="x"></i></button>
            </div>
            <div id="modalBody" class="text-slate-600 leading-relaxed space-y-4"></div>
        </div>
    </div>

    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-lg border-b border-slate-100 py-4">
        <div class="container mx-auto px-6 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-flux p-2 rounded-xl text-white shadow-lg"><i data-lucide="shield-check"></i></div>
                <span class="text-2xl font-black tracking-tighter">FluxCall</span>
            </div>
            <div class="hidden lg:flex gap-8 font-bold text-xs uppercase tracking-widest text-slate-500">
                <a href="#automation" class="hover:text-indigo-600">Workflows</a>
                <a href="#pricing" class="hover:text-indigo-600">Pricing</a>
                <a href="#security" class="hover:text-indigo-600">Security</a>
            </div>
            <div class="flex gap-4 items-center">
                <div id="userProfile" class="hidden flex items-center gap-2 mr-2">
                    <span id="userName" class="text-xs font-bold text-slate-600"></span>
                </div>
                <button id="authBtnNav" onclick="handleAuthAction()" class="font-bold text-indigo-600 text-sm px-4 py-2 border border-indigo-100 rounded-xl hover:bg-indigo-50 transition">Sign In</button>
            </div>
        </div>
    </nav>

    <section class="pt-16 pb-20 px-6 text-center">
        <div class="container mx-auto max-w-4xl">
            <h1 class="text-5xl md:text-7xl font-extrabold text-slate-900 mb-6 tracking-tighter">
                Identity Meets <br/><span class="text-indigo-600 underline decoration-indigo-200">Automation.</span>
            </h1>
            <div class="max-w-2xl mx-auto flex flex-col md:flex-row bg-white p-2 rounded-3xl shadow-2xl border border-slate-100 mt-12">
                <input type="tel" id="mainSearch" placeholder="Global Phone Lookup..." class="w-full p-4 text-xl font-semibold outline-none rounded-2xl">
                <button onclick="runLookup()" class="bg-slate-900 text-white px-8 py-4 rounded-2xl font-bold hover:bg-indigo-600 transition">Search</button>
            </div>
        </div>
    </section>

    <section id="pricing" class="py-24 bg-white">
        <div class="container mx-auto px-6 text-center">
            <h2 class="text-4xl font-black mb-12">Choose Your Plan</h2>
            <div class="flex items-center justify-center gap-4 mb-12">
                <span class="text-sm font-bold text-slate-500">Monthly</span>
                <button onclick="togglePricing()" id="toggleBtn" class="w-14 h-8 bg-indigo-100 rounded-full p-1 relative">
                    <div id="toggleCircle" class="w-6 h-6 bg-indigo-600 rounded-full shadow-md pricing-toggle"></div>
                </button>
                <span class="text-sm font-bold text-slate-900">Yearly</span>
            </div>

            <div class="grid md:grid-cols-2 gap-8 max-w-4xl mx-auto">
                <div class="bg-white p-10 rounded-[3rem] border-2 border-indigo-600 shadow-2xl">
                    <h3 class="font-bold text-indigo-600 mb-4 uppercase tracking-widest text-xs">Premium</h3>
                    <div id="premiumPrice" class="text-5xl font-black mb-8">$4.99<span class="text-sm text-slate-400">/mo</span></div>
                    <button onclick="initiatePayment('Premium')" class="w-full py-4 rounded-2xl bg-indigo-600 text-white font-black hover:bg-slate-900 transition shadow-xl">Buy Now</button>
                </div>
                <div class="bg-white p-10 rounded-[3rem] border border-slate-100 shadow-sm">
                    <h3 class="font-bold text-slate-400 mb-4 uppercase tracking-widest text-xs">Agency</h3>
                    <div class="text-5xl font-black mb-8">$29<span class="text-sm text-slate-400">/mo</span></div>
                    <button onclick="initiatePayment('Agency')" class="w-full py-4 rounded-2xl border-2 border-slate-900 text-slate-900 font-bold hover:bg-slate-900 hover:text-white transition">Buy Now</button>
                </div>
            </div>

            <div class="mt-16 p-8 bg-indigo-50 rounded-3xl max-w-2xl mx-auto border border-indigo-100">
                <h4 class="font-bold mb-4">Refund Eligibility</h4>
                <div class="flex flex-col gap-3">
                    <input type="email" id="refundEmail" placeholder="Login to auto-fill email" class="w-full p-3 rounded-xl border border-indigo-200 outline-none bg-white/50" readonly>
                    <input type="date" id="purchaseDate" class="w-full p-3 rounded-xl border border-indigo-200 outline-none">
                    <button onclick="checkRefund()" class="bg-indigo-600 text-white px-6 py-3 rounded-xl font-bold">Check Status</button>
                </div>
                <p id="refundStatus" class="mt-4 text-sm font-bold"></p>
            </div>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, OAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB8GvZ5I7S6dFduA0EnsK6W2iCIOuzYKfg",
            authDomain: "fluxcall-d4f1c.firebaseapp.com",
            projectId: "fluxcall-d4f1c",
            storageBucket: "fluxcall-d4f1c.firebasestorage.app",
            messagingSenderId: "475923161939",
            appId: "1:475923161939:web:45f3758e1efd46edbf37a6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        window.auth = auth;

        onAuthStateChanged(auth, (user) => {
            const authBtn = document.getElementById('authBtnNav');
            const profile = document.getElementById('userProfile');
            const nameSpan = document.getElementById('userName');
            const refundEmail = document.getElementById('refundEmail');

            if (user) {
                window.currentUser = user;
                authBtn.innerText = "Logout";
                nameSpan.innerText = user.displayName || "User";
                profile.classList.remove('hidden');
                refundEmail.value = user.email;
            } else {
                window.currentUser = null;
                authBtn.innerText = "Sign In";
                profile.classList.add('hidden');
                refundEmail.value = "";
            }
        });

        document.getElementById('googleLogin').addEventListener('click', async () => {
            try { await signInWithPopup(auth, new GoogleAuthProvider()); closeAuthModal(); } catch (e) { alert(e.message); }
        });

        document.getElementById('appleLogin').addEventListener('click', async () => {
            try { await signInWithPopup(auth, new OAuthProvider('apple.com')); closeAuthModal(); } catch (e) { alert("Apple login error"); }
        });
    </script>

    <script>
        lucide.createIcons();
        let isYearly = false;

        function handleAuthAction() {
            if (window.currentUser) { window.auth.signOut(); } else { openAuthModal(); }
        }

        function openAuthModal() { document.getElementById('authModal').style.display = 'flex'; }
        function closeAuthModal() { document.getElementById('authModal').style.display = 'none'; }
        function closeInfoModal() { document.getElementById('infoModal').style.display = 'none'; }

        function togglePricing() {
            const circle = document.getElementById('toggleCircle');
            const price = document.getElementById('premiumPrice');
            isYearly = !isYearly;
            circle.style.transform = isYearly ? 'translateX(24px)' : 'translateX(0px)';
            price.innerHTML = isYearly ? '$45<span class="text-sm text-slate-400">/yr</span>' : '$4.99<span class="text-sm text-slate-400">/mo</span>';
        }

        function initiatePayment(plan) {
            if (!window.currentUser) {
                alert("Please Sign In first to continue.");
                openAuthModal();
                return;
            }
            let url = plan === 'Premium' ? (isYearly ? "https://rzp.io/rzp/Bh3m2WG1" : "https://rzp.io/rzp/zdpGJthc") : "https://rzp.io/rzp/hfxRQ7yA";
            window.open(url, '_blank');
        }

        function checkRefund() {
            if (!window.currentUser) return alert("Please Sign In to verify refund eligibility.");
            const date = document.getElementById('purchaseDate').value;
            const status = document.getElementById('refundStatus');
            if (!date) return alert("Select purchase date");
            
            const diff = Math.ceil(Math.abs(new Date() - new Date(date)) / (1000 * 60 * 60 * 24));
            if (diff <= 7) {
                status.className = "mt-4 text-sm font-bold text-green-600";
                status.innerText = "Eligible! Request recorded for " + window.currentUser.email;
            } else {
                status.className = "mt-4 text-sm font-bold text-red-500";
                status.innerText = "Window closed (7 days exceeded).";
            }
        }

        window.onclick = (e) => { 
            if (e.target.classList.contains('modal')) { closeAuthModal(); closeInfoModal(); } 
        }

        function runLookup() {
            if(document.getElementById('mainSearch').value.length < 5) return alert("Invalid number");
            alert("Searching...");
        }
    </script>
</body>
</html>
